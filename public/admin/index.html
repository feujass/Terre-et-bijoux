<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Administration — Terre et Bijou</title>
  </head>
  <body>
    <!--
      Netlify Identity : authentification pour accéder au CMS.
      À activer côté Netlify (Identity + Git Gateway) pour que les commits Git fonctionnent.
    -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function (user) {
          if (!user) {
            window.netlifyIdentity.on("login", function () {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>

    <!-- Decap CMS : charge la configuration depuis /admin/config.yml -->
    <script src="https://unpkg.com/decap-cms@^3.4.0/dist/decap-cms.js"></script>
  </body>
</html>
