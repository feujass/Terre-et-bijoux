# Decap CMS — Terre et Bijou
# Les chemins media_folder commençant par "/" sont relatifs à la RACINE du dépôt
# (évite l’enregistrement sous content/services/public/...).

site_url: https://terreetbijou.netlify.app

backend:
  name: git-gateway
  branch: main

locale: fr

collections:
  - name: realisations
    label: Réalisations
    label_singular: Réalisation
    folder: content/realisations
    create: true
    slug: "{{slug}}"
    identifier_field: titre
    extension: md
    format: frontmatter
    media_folder: /public/images/realisations
    public_folder: /images/realisations
    fields:
      - { label: Titre, name: titre, widget: string }
      - { label: Description, name: description, widget: text }
      - label: Image
        name: image
        widget: image
        hint: "JPG ou PNG. Après Publier : vérifier sur GitHub que le fichier est bien dans public/images/realisations/"
      - label: Catégorie
        name: categorie
        widget: select
        options:
          - Jardin
          - Terrasse
          - Clôture
          - Allée
          - Autre
      - { label: Date, name: date, widget: datetime, date_format: DD/MM/YYYY, time_format: false }

  - name: services
    label: Services
    label_singular: Service
    folder: content/services
    create: true
    slug: "{{slug}}"
    identifier_field: titre
    extension: md
    format: frontmatter
    media_folder: /public/images/services
    public_folder: /images/services
    fields:
      - { label: Titre, name: titre, widget: string }
      - label: Ordre d'affichage
        name: ordre
        widget: number
        value_type: int
        min: 1
        max: 20
        default: 1
        hint: "1 = en premier sur la page Services"
      - { label: Icône (emoji), name: icone, widget: string, hint: "Ex. 🌿" }
      - label: Résumé (cartes page d'accueil)
        name: resume
        widget: text
        hint: "Texte court sous le titre sur l'accueil"
      - label: Description (page Services)
        name: description
        widget: text
      - label: Points forts (puces)
        name: points
        widget: list
        field:
          label: Ligne
          name: ligne
          widget: string
      - label: Photo du service
        name: image
        widget: image
        hint: "JPG ou PNG. Le fichier doit apparaître sur GitHub dans public/images/services/ — sinon le site affiche un « ? ». Après Publier, attendre le déploiement Netlify."
