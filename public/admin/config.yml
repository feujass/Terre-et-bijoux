# Decap CMS — Terre et Bijou
# Backend : Git Gateway (Netlify Identity) → écrit dans le dépôt GitHub lié au site.
# Remplacez site_url par l’URL exacte de production (Netlify ou domaine custom).

site_url: https://terre-et-bijou.fr
media_folder: public/images/realisations
public_folder: /images/realisations

backend:
  name: git-gateway
  branch: main

locale: fr

collections:
  - name: realisations
    label: Réalisations
    label_singular: Réalisation
    folder: content/realisations
    create: true
    # Nom de fichier dérivé du titre (sanitisé par Decap).
    slug: "{{slug}}"
    identifier_field: titre
    extension: md
    format: frontmatter
    fields:
      - { label: Titre, name: titre, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Image, name: image, widget: image }
      - label: Catégorie
        name: categorie
        widget: select
        options:
          - Jardin
          - Terrasse
          - Clôture
          - Allée
          - Autre
      - { label: Date, name: date, widget: datetime, date_format: DD/MM/YYYY, time_format: false }
